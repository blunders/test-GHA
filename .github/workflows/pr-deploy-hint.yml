name: PR unstable deploy hint

# Posts (and keeps updated) a sticky comment on every PR with a clickable link
# to the "Deploy unstable" workflow. GitHub does not render a real
# workflow_dispatch button inside a PR, so this is the closest thing: one click
# lands the engineer on the Run-workflow page where they pick this branch.

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.payload.pull_request.head.ref;
            const url = `https://github.com/${owner}/${repo}/actions/workflows/deploy-unstable.yml`;
            const marker = '<!-- unstable-deploy-hint -->';
            const body = [
              marker,
              '### 🚀 Deploy this PR to **unstable**',
              '',
              `[▶️ Run the **Deploy unstable** workflow](${url})`,
              '',
              `Click the link, press **Run workflow**, select branch \`${branch}\`, and confirm.`,
              'This updates `example-app/unstable/versions.yaml` and runs a mock ArgoCD sync.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: context.issue.number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: context.issue.number, body });
            }
