name: Deploy unstable

# Engineer-triggered deploy of a PR branch to the unstable environment.
# Trigger via the "Run workflow" button (workflow_dispatch) and pick the PR
# branch from the ref dropdown. The PR also gets a sticky comment linking here
# (see pr-deploy-hint.yml).
#
# This updates `version` in example-app/unstable/versions.yaml. The `ref` field
# there stays `review` (the unstable env tracks whatever is under review).

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why deploy this branch to unstable?
        required: false
        default: testing PR changes

concurrency:
  group: deploy-unstable
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build image (mock)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          echo "version=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "Deploying ${GITHUB_REF_NAME} @ ${GITHUB_SHA} to unstable"
          echo "reason: ${{ inputs.reason }}"
          echo "::group::Build image (mocked)"
          echo "+ docker build -t registry.internal/example-app:${GITHUB_SHA} ."
          echo "+ docker push registry.internal/example-app:${GITHUB_SHA}"
          echo "::endgroup::"

  deploy-unstable:
    name: Deploy unstable
    needs: build
    runs-on: ubuntu-latest
    environment: unstable
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/argocd-deploy
        with:
          environment: unstable
          image-version: ${{ needs.build.outputs.version }}
          app-id: ${{ secrets.VERSIONS_APP_ID }}
          private-key: ${{ secrets.VERSIONS_APP_PRIVATE_KEY }}

      - name: Write deploy summary
        env:
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ needs.build.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          {
            echo "### 🚀 Deployed to unstable"
            echo ""
            echo "| field | value |"
            echo "| --- | --- |"
            echo "| branch | \`${BRANCH}\` |"
            echo "| commit | \`${SHA}\` |"
            echo "| versions file | [example-app/unstable/versions.yaml](${GITHUB_SERVER_URL}/${OWNER}/test-GHA-versions/blob/main/example-app/unstable/versions.yaml) |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report deploy status on the PR
        uses: actions/github-script@v7
        env:
          SHA: ${{ needs.build.outputs.version }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const sha = process.env.SHA;
            const short = sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const versionsUrl = `${context.serverUrl}/${owner}/test-GHA-versions/blob/main/example-app/unstable/versions.yaml`;

            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: 'open', head: `${owner}:${branch}`,
            });
            if (prs.length === 0) {
              core.info(`No open PR for branch ${branch}; deploy summary only.`);
              return;
            }

            const marker = '<!-- unstable-deploy-status -->';
            const body = [
              marker,
              '### ✅ Deployed to **unstable**',
              '',
              `\`${branch}@${short}\` — [workflow run](${runUrl}) · [unstable/versions.yaml](${versionsUrl})`,
            ].join('\n');

            for (const pr of prs) {
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number: pr.number, per_page: 100,
              });
              const existing = comments.find(c => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
              }
            }
